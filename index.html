<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danford Group — Scheduled Maintenance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --ink: #0E1B2B;
    --ink-soft: #1C2E45;
    --paper: #F3F1EC;
    --gold: #B8935A;
    --gold-soft: rgba(184, 147, 90, 0.35);
    --line: rgba(243, 241, 236, 0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    background: radial-gradient(120% 140% at 50% -10%, var(--ink-soft) 0%, var(--ink) 55%, #08111c 100%);
    color: var(--paper);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }

  /* Faint concentric arcs — a signal being tuned, not decoration for its own sake */
  .arcs {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1400px;
    height: 1400px;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .arcs svg { width: 100%; height: 100%; }
  .arcs circle {
    fill: none;
    stroke: var(--gold);
    opacity: 0.08;
  }

  .card {
    position: relative;
    z-index: 2;
    max-width: 620px;
    width: 100%;
    text-align: center;
  }

  .mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 54px;
    height: 54px;
    border: 1px solid var(--gold-soft);
    border-radius: 50%;
    margin-bottom: 28px;
    position: relative;
  }
  .mark::before {
    content: "";
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.6); opacity: 0.4; }
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 18px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(34px, 5.2vw, 52px);
    line-height: 1.12;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
  }

  h1 span {
    color: var(--gold);
    font-style: italic;
    font-weight: 500;
  }

  p.lead {
    font-size: 17px;
    line-height: 1.65;
    color: rgba(243, 241, 236, 0.72);
    max-width: 460px;
    margin: 0 auto 40px;
  }

  .divider {
    width: 56px;
    height: 1px;
    background: var(--gold-soft);
    margin: 0 auto 36px;
  }

  .contact {
    display: inline-flex;
    flex-direction: column;
    gap: 10px;
    padding: 22px 32px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: rgba(243, 241, 236, 0.03);
  }

  .contact .label {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(243, 241, 236, 0.5);
  }

  .contact a {
    color: var(--paper);
    font-size: 18px;
    font-weight: 500;
    text-decoration: none;
    letter-spacing: 0.01em;
    border-bottom: 1px solid var(--gold-soft);
    padding-bottom: 2px;
    transition: border-color 0.2s ease, color 0.2s ease;
  }

  .contact a:hover,
  .contact a:focus-visible {
    color: var(--gold);
    border-color: var(--gold);
  }

  footer {
    margin-top: 44px;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(243, 241, 236, 0.35);
  }

  @media (max-width: 480px) {
    .contact { padding: 18px 22px; }
    .contact a { font-size: 16px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .mark::before { animation: none; }
  }
</style>
</head>
<body>

  <div class="arcs" aria-hidden="true">
    <svg viewBox="0 0 1400 1400">
      <circle cx="700" cy="700" r="300" stroke-width="1"/>
      <circle cx="700" cy="700" r="440" stroke-width="1"/>
      <circle cx="700" cy="700" r="580" stroke-width="1"/>
    </svg>
  </div>

  <main class="card">
    <div class="mark" aria-hidden="true"></div>
    <p class="eyebrow">Danford Group</p>
    <h1>We're carrying out<br><span>routine maintenance</span></h1>
    <p class="lead">
      Our site is temporarily offline while we make some scheduled improvements.
      We'll be back shortly — thank you for your patience.
    </p>
    <div class="divider"></div>
    <div class="contact">
      <span class="label">Urgent matters</span>
      <a href="mailto:info@danfordhe.com">info@danfordhe.com</a>
    </div>
    <footer>© 2026 Danford Group. All rights reserved.</footer>
  </main>

</body>
</html>
